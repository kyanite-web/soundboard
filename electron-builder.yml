appId: com.soundboard.app
productName: Soundboard
directories:
  output: dist-electron
files:
  - dist/**/*
  - electron/**/*
  - package.json
extraResources:
  - from: electron/
    to: electron/
mac:
  category: public.app-category.music
  target:
    - dmg
    - zip
win:
  target:
    - nsis
    - portable
linux:
  target:
    - AppImage
    - deb
  category: Audio
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
